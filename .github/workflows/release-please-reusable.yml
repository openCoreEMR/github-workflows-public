# Release Please reusable workflow. Wraps the openCoreEMR release-please-action
# fork to open release PRs and cut annotated tags from conventional commits.
#
# Recommended caller stanza (mints a token from a GitHub App so release PRs
# trigger pull_request workflows):
#
#   name: Release Please
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:
#   permissions: {}
#   jobs:
#     release-please:
#       uses: openCoreEMR/github-workflows-public/.github/workflows/release-please-reusable.yml@<tag>
#       permissions:
#         contents: write
#         pull-requests: write
#       secrets:
#         app-client-id: ${{ vars.RELEASE_PLEASE_CLIENT_ID }}
#         app-private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
#
# Without app-client-id/app-private-key the workflow falls back to the
# default GITHUB_TOKEN, which still works but means release PRs do not
# trigger pull_request workflows (GitHub anti-recursion).
name: Release Please (reusable)

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to release-please-config.json
        type: string
        default: release-please-config.json
      manifest-file:
        description: Path to .release-please-manifest.json
        type: string
        default: .release-please-manifest.json
      runs-on:
        description: Runner label for the job
        type: string
        default: ubuntu-latest
      checkout-fetch-depth:
        description: fetch-depth for actions/checkout
        type: number
        default: 0
    secrets:
      token:
        description: |
          Pre-minted token for checkout and release-please. Falls back to
          GITHUB_TOKEN. Prefer app-client-id/app-private-key so the token is
          minted inside this job (cross-job secret masking would zero it out).
        required: false
      app-client-id:
        description: |
          GitHub App Client ID. When provided together with app-private-key,
          the workflow mints a short-lived installation token inside this job
          and uses it for checkout and release-please. Overrides `token`.
        required: false
      app-private-key:
        description: GitHub App private key (PEM). Paired with app-client-id.
        required: false
    outputs:
      releases_created:
        description: '"true" if any release was created'
        value: ${{ jobs.release-please.outputs.releases_created }}
      release_created:
        description: '"true" if a release was created (root package, manifest mode)'
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: Tag name of the created release (root package)
        value: ${{ jobs.release-please.outputs.tag_name }}
      version:
        description: Version of the created release (root package)
        value: ${{ jobs.release-please.outputs.version }}
      paths_released:
        description: JSON array of package paths that were released
        value: ${{ jobs.release-please.outputs.paths_released }}

jobs:
  release-please:
    name: Release Please
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
      pull-requests: write
    # Hoist credentials to job env so step-level `if:` can read them.
    # GitHub allows the `env` context in step `if:` only when env is defined
    # at the workflow or job level; the `secrets` context is not available
    # in step `if:` at all.
    env:
      APP_CLIENT_ID: ${{ secrets.app-client-id }}
      APP_PRIVATE_KEY: ${{ secrets.app-private-key }}
      PASSED_TOKEN: ${{ secrets.token }}
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      paths_released: ${{ steps.release.outputs.paths_released }}

    steps:
      # Mint an App installation token in-job. GitHub masks secret values when
      # they cross job boundaries via needs.outputs, so a sibling mint job
      # would deliver "***" instead of a usable token. Doing it here keeps the
      # token in the same job and reaching the release-please action intact.
      - name: Mint App token
        id: app-token
        if: ${{ env.APP_CLIENT_ID != '' && env.APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v3
        with:
          # `app-id` accepts a Client ID as well; the action emits a runtime
          # deprecation warning preferring `client-id`, but the bundled
          # actionlint database doesn't know `client-id` yet and fails the
          # workflow. Stay on `app-id` until actionlint catches up.
          app-id: ${{ env.APP_CLIENT_ID }}
          private-key: ${{ env.APP_PRIVATE_KEY }}

      - name: Resolve effective token
        id: resolve-token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [[ -n "${APP_TOKEN}" ]]; then
            echo "::add-mask::${APP_TOKEN}"
            printf 'token=%s\n' "${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${PASSED_TOKEN}" ]]; then
            echo "::add-mask::${PASSED_TOKEN}"
            printf 'token=%s\n' "${PASSED_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            printf 'token=%s\n' "${{ github.token }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.checkout-fetch-depth }}
          token: ${{ steps.resolve-token.outputs.token }}

      - name: Run Release Please
        id: release
        uses: openCoreEMR/release-please-action@v5.0.0-oce.1
        with:
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          token: ${{ steps.resolve-token.outputs.token }}

      - name: Summary
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          TAG: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          # shellcheck disable=SC2016 # printf interprets the format string; single quotes are correct
          {
            printf '## Release Created\n\n'
            printf '| Tag | Version |\n'
            printf '|-----|---------|\n'
            printf '| `%s` | `%s` |\n' "$TAG" "$VERSION"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary - No Release
        if: ${{ steps.release.outputs.releases_created != 'true' }}
        run: |
          # shellcheck disable=SC2016 # printf interprets the format string; single quotes are correct
          {
            printf '## No Release Created\n\n'
            printf 'No conventional commits requiring a release were found.\n'
          } >> "$GITHUB_STEP_SUMMARY"
