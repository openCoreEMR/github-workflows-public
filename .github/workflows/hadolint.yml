# hadolint (Dockerfile linter) reusable workflow.
#
# Recommended caller stanza. Do not add `paths:` to `pull_request`; it
# breaks promotion to a required check (skipped run = missing check =
# auto-merge stall). Path filtering on `push` is fine.
#
#   name: hadolint
#   on:
#     push:
#       branches: [main]
#       paths:
#         - '**/Dockerfile*'
#         - .github/workflows/hadolint.yml
#     pull_request:
#       branches: [main]
#   jobs:
#     hadolint:
#       uses: openCoreEMR/github-workflows-public/.github/workflows/hadolint.yml@<tag>
#       permissions:
#         contents: read
name: hadolint (reusable)

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner label
        type: string
        default: ubuntu-latest

jobs:
  hadolint:
    name: Lint Dockerfiles
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run hadolint
        run: |
          git ls-files -z 'Dockerfile*' \
                          '**/Dockerfile*' |
          xargs --null --no-run-if-empty --replace={} \
            docker run --rm -v "$PWD:/workdir" -w /workdir hadolint/hadolint hadolint "{}"
