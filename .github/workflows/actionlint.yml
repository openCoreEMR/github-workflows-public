name: actionlint

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/actions/**
  workflow_call:
    inputs:
      runs-on:
        description: Runner label
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12
