# PHPUnit reusable workflow with PHP-version matrix.
#
# Coverage is supported but not required. By default the reusable installs
# pcov on every matrix entry (so PHPUnit configs that declare a <coverage>
# block don't trip "No code coverage driver available" warnings) but does
# NOT actually collect coverage. To collect and upload an HTML coverage
# report, set `coverage-php-version` to the matrix entry that should run
# coverage; the rest of the matrix continues to run `test-script`.
#
# Recommended caller stanza (no coverage collection):
#
#   name: Tests
#   on:
#     push:
#       branches: [main]
#     pull_request:
#       branches: [main]
#   jobs:
#     test:
#       uses: openCoreEMR/github-workflows-public/.github/workflows/php-tests.yml@<tag>
#
# To enable coverage collection on PHP 8.2 and upload the HTML report:
#
#   jobs:
#     test:
#       uses: openCoreEMR/github-workflows-public/.github/workflows/php-tests.yml@<tag>
#       with:
#         coverage-php-version: '8.2'
#
# Tests depend on too many runtime assets (templates, SQL, config,
# fixtures) to safely enumerate via a paths filter. Don't add one.
name: PHP Tests (reusable)

on:
  workflow_call:
    inputs:
      php-versions:
        description: JSON array of PHP versions to test
        type: string
        default: '["8.2","8.3","8.4","8.5"]'
      php-extensions:
        description: PHP extensions to install
        type: string
        default: 'curl, json, mbstring'
      composer-install-args:
        description: Arguments for composer install
        type: string
        default: '--prefer-dist --no-progress --no-interaction'
      test-script:
        description: Command run on every matrix entry that is not the coverage entry. Also runs on the coverage entry when coverage-php-version is empty.
        type: string
        default: 'composer test'
      coverage-driver:
        description: Coverage driver to install on every matrix entry. Defaults to pcov so phpunit configs with a <coverage> block do not warn. Set to 'none' to skip; set to 'xdebug' for branch coverage.
        type: string
        default: 'pcov'
      coverage-php-version:
        description: If non-empty, run coverage-command on the matrix entry matching this PHP version (instead of test-script) and upload an HTML coverage artifact. Leave empty to skip coverage collection entirely.
        type: string
        default: ''
      coverage-command:
        description: Command run on the coverage matrix entry. Used only when coverage-php-version is non-empty.
        type: string
        default: 'vendor/bin/phpunit --coverage-text --coverage-html coverage-report --colors=never'
      coverage-artifact-name:
        description: Artifact name for the uploaded coverage report
        type: string
        default: 'coverage-report'
      coverage-artifact-path:
        description: Path to upload as the coverage artifact
        type: string
        default: 'coverage-report/'
      coverage-retention-days:
        description: Retention days for the coverage artifact
        type: number
        default: 14
      private-repos:
        description: Comma-separated list of private repos the GitHub App token should access. If non-empty, secrets app-id and app-private-key must be provided.
        type: string
        default: ''
      runs-on:
        description: Runner label
        type: string
        default: ubuntu-latest
    secrets:
      app-id:
        required: false
      app-private-key:
        required: false

jobs:
  test:
    name: PHP ${{ matrix.php-version }} Tests
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php-version: ${{ fromJSON(inputs.php-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate token for private repos
        if: ${{ inputs.private-repos != '' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.app-private-key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.private-repos }}

      - name: Configure git auth for private repos
        if: ${{ inputs.private-repos != '' }}
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ${{ inputs.php-extensions }}
          coverage: ${{ inputs.coverage-driver }}
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: |
          {
            printf dir=
            composer config cache-files-dir
          } > "$GITHUB_OUTPUT"

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install ${{ inputs.composer-install-args }}

      - name: Run tests
        if: ${{ inputs.coverage-php-version == '' || matrix.php-version != inputs.coverage-php-version }}
        run: ${{ inputs.test-script }}

      - name: Run tests with coverage
        if: ${{ inputs.coverage-php-version != '' && matrix.php-version == inputs.coverage-php-version }}
        run: |
          echo "::group::Running PHPUnit with Coverage"
          ${{ inputs.coverage-command }}
          echo "::endgroup::"

      - name: Upload coverage report
        if: ${{ inputs.coverage-php-version != '' && matrix.php-version == inputs.coverage-php-version }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.coverage-artifact-path }}
          retention-days: ${{ inputs.coverage-retention-days }}
