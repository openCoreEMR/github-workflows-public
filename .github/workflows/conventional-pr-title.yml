# Conventional PR Title reusable workflow. Validates that PR titles follow
# Conventional Commits. No paths filter — must run on every PR title change.
#
# Recommended caller stanza:
#
#   name: Conventional PR Title
#   on:
#     pull_request:
#       types: [opened, edited, synchronize, reopened]
#   jobs:
#     conventional-pr-title:
#       uses: openCoreEMR/github-workflows-public/.github/workflows/conventional-pr-title.yml@<tag>
name: Conventional PR Title (reusable)

on:
  workflow_call:
    inputs:
      types:
        description: Newline-separated list of allowed conventional-commit types
        type: string
        default: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          build
          ci
          chore
          revert
          deps
      require-scope:
        description: Whether to require a scope in the PR title
        type: boolean
        default: false
      subject-pattern:
        description: Regex the subject must match
        type: string
        default: '^(?![A-Z]).+$'
      subject-pattern-error:
        description: Error message shown when the subject does not match
        type: string
        default: |
          The subject "{subject}" found in the pull request title "{title}"
          didn't match the configured pattern. Please ensure that the subject
          doesn't start with an uppercase character.
      runs-on:
        description: Runner label
        type: string
        default: ubuntu-latest

jobs:
  conventional-pr-title:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: ${{ inputs.types }}
          requireScope: ${{ inputs.require-scope }}
          subjectPattern: ${{ inputs.subject-pattern }}
          subjectPatternError: ${{ inputs.subject-pattern-error }}
